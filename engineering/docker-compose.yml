# MiniVecDB Docker Compose 配置
# 单节点部署配置

version: '3.8'

services:
  minivecdb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: minivecdb
    restart: unless-stopped

    # 端口映射
    ports:
      - "8080:8080"  # REST API

    # 数据卷挂载
    volumes:
      - minivecdb_data:/data           # 数据持久化
      - ./logs:/var/log/minivecdb     # 日志目录（可选）

    # 环境变量
    environment:
      - MINIVECDB_DATA_DIR=/data
      - MINIVECDB_LOG_LEVEL=info
      - MINIVECDB_HOST=0.0.0.0
      - MINIVECDB_PORT=8080

    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # 资源限制（可选）
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# 数据卷
volumes:
  minivecdb_data:
    driver: local
