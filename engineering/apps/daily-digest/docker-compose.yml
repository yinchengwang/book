version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: daily-digest-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: daily_digest
      POSTGRES_PASSWORD: daily_digest
      POSTGRES_DB: daily_digest
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daily_digest -d daily_digest"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata: