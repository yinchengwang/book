name: 游戏小程序测试

on:
  push:
    branches: [main, project]
  pull_request:
    branches: [main, project]

jobs:
  unit-test:
    name: 单元测试
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: engineering/apps/web/games-mini-program/package-lock.json

      - name: 安装依赖
        run: |
          cd engineering/apps/web/games-mini-program
          npm ci

      - name: 运行单元测试
        run: |
          cd engineering/apps/web/games-mini-program
          npm run test:unit

      - name: 上传覆盖率报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: engineering/apps/web/games-mini-program/coverage/

  e2e-test:
    name: E2E 测试
    runs-on: ubuntu-latest
    needs: unit-test

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: engineering/apps/web/games-mini-program/package-lock.json

      - name: 安装依赖
        run: |
          cd engineering/apps/web/games-mini-program
          npm ci

      - name: 安装 Playwright 浏览器
        run: |
          cd engineering/apps/web/games-mini-program
          npx playwright install --with-deps chromium

      - name: 启动 H5 开发服务器
        run: |
          cd engineering/apps/web/games-mini-program
          npm run dev:h5 &
          echo "等待服务器启动..."
          sleep 60

      - name: 运行 E2E 测试
        run: |
          cd engineering/apps/web/games-mini-program
          npx playwright test --reporter=list || true

      - name: 上传测试截图
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: engineering/apps/web/games-mini-program/test-results/
          retention-days: 7

  lint:
    name: 代码检查
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: engineering/apps/web/games-mini-program/package-lock.json

      - name: 安装依赖
        run: |
          cd engineering/apps/web/games-mini-program
          npm ci

      - name: 运行 ESLint
        run: |
          cd engineering/apps/web/games-mini-program
          npm run lint || true

  build:
    name: 构建检查
    runs-on: ubuntu-latest
    needs: [unit-test, lint]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: engineering/apps/web/games-mini-program/package-lock.json

      - name: 安装依赖
        run: |
          cd engineering/apps/web/games-mini-program
          npm ci

      - name: 构建 H5 版本
        run: |
          cd engineering/apps/web/games-mini-program
          npm run build:h5

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist-h5
          path: engineering/apps/web/games-mini-program/dist/