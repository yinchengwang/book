// ============================================================
// 在线编辑器（弹窗）
// ============================================================
let editorFiles = [];       // [{ name, content, isNew }]
let editorCatId = '';
let editorProjId = '';
let editorActiveTab = 0;

async function showCodeEditor(catId, projId) {
  editorCatId = catId;
  editorProjId = projId;
  editorFiles = [];
  editorActiveTab = 0;

  // 加载已有文件
  const fileNames = getStoredFileList(catId, projId);
  if (fileNames.length > 0) {
    const files = await loadProjectFiles(catId, projId);
    editorFiles = files.map(f => ({ name: f.name, content: f.content, isNew: false }));
  }

  if (editorFiles.length === 0) {
    // 默认创建 main.c
    editorFiles.push({ name: 'main.c', content: '// 在此编写代码...\n', isNew: true });
  }

  renderEditorUI();
  document.getElementById('editorModal').classList.add('active');
}

function renderEditorUI() {
  const tabsDiv = document.getElementById('editorTabs');
  let tabsHtml = '';
  editorFiles.forEach((f, i) => {
    tabsHtml += `<div class="editor-tab ${i === editorActiveTab ? 'active' : ''}"
      onclick="switchEditorTab(${i})" ondblclick="renameEditorFile(${i})">
      ${escapeHtml(f.name)}
      ${editorFiles.length > 1 ? `<span class="et-close" onclick="event.stopPropagation();closeEditorTab(${i})">✕</span>` : ''}
    </div>`;
  });
  tabsHtml += `<div class="editor-tab-add" onclick="addEditorFile()" title="新建文件">+</div>`;
  tabsDiv.innerHTML = tabsHtml;

  // 更新文本区
  const textarea = document.getElementById('editorTextarea');
  textarea.value = editorFiles[editorActiveTab]?.content || '';
}

function switchEditorTab(index) {
  // 保存当前tab内容
  const textarea = document.getElementById('editorTextarea');
  if (editorFiles[editorActiveTab]) {
    editorFiles[editorActiveTab].content = textarea.value;
  }
  editorActiveTab = index;
  renderEditorUI();
}

function addEditorFile() {
  const name = prompt('输入新文件名 (例如: shell.c):');
  if (!name || !name.trim()) return;
  // 保存当前内容
  const textarea = document.getElementById('editorTextarea');
  if (editorFiles[editorActiveTab]) {
    editorFiles[editorActiveTab].content = textarea.value;
  }
  editorFiles.push({ name: name.trim(), content: '', isNew: true });
  editorActiveTab = editorFiles.length - 1;
  renderEditorUI();
}

function closeEditorTab(index) {
  if (editorFiles.length <= 1) return;
  editorFiles.splice(index, 1);
  if (editorActiveTab >= editorFiles.length) editorActiveTab = editorFiles.length - 1;
  renderEditorUI();
}

function renameEditorFile(index) {
  const newName = prompt('重命名文件:', editorFiles[index].name);
  if (!newName || !newName.trim()) return;
  editorFiles[index].name = newName.trim();
  renderEditorUI();
}

async function saveEditorFiles() {
  // 保存当前tab内容
  const textarea = document.getElementById('editorTextarea');
  if (editorFiles[editorActiveTab]) {
    editorFiles[editorActiveTab].content = textarea.value;
  }

  // 验证：至少有一个非空文件
  const nonEmpty = editorFiles.filter(f => f.content.trim().length > 0);
  if (nonEmpty.length === 0) {
    alert('请至少编写一个非空文件。');
    return;
  }

  await saveProjectFiles(editorCatId, editorProjId,
    editorFiles.map(f => ({ name: f.name, content: f.content, size: f.content.length })));

  // 运行自动检查
  const project = findProject(editorCatId, editorProjId);
  if (project) {
    const files = editorFiles.map(f => ({ name: f.name, content: f.content }));
    const checkResults = runAllAutoChecks(project, files);
    setAutoCheckCache(editorCatId, editorProjId, checkResults);
  }

  closeEditor();
  renderProjectDetail(editorCatId, editorProjId);
}

function closeEditor() {
  document.getElementById('editorModal').classList.remove('active');
}

function closeModal() {
  document.getElementById('codeModal').classList.remove('active');
  currentViewerFile = null;
}

// 供项目详情页"上传文件夹"按钮使用
function uploadProjectCodeAndRefresh(catId, projId) {
  triggerFolderUpload(async (files) => {
    await saveProjectFiles(catId, projId, files);
    const project = findProject(catId, projId);
    if (project) {
      const checkResults = runAllAutoChecks(project, files);
      setAutoCheckCache(catId, projId, checkResults);
    }
    renderProjectDetail(catId, projId);
  });
}

async function deleteProjectCode(catId, projId) {
  if (!confirm('确定清除已上传的项目代码吗？此操作不可撤销。')) return;
  await deleteProjectFiles(catId, projId);
  try { localStorage.removeItem(getStorageKey(catId, `autocheck_${projId}`)); } catch(e) {}
  try { localStorage.removeItem(getStorageKey(catId, `checklist_${projId}`)); } catch(e) {}
  _scheduleServerSync();
  renderProjectDetail(catId, projId);
}

function saveProjectNotes(catId, projId, notes) {
  const scores = loadProjectScores(catId);
  if (!scores[projId]) scores[projId] = {};
  scores[projId]['_notes'] = notes;
  saveProjectScores(catId, scores);
}

function saveProjectEval(catId, projId) {
  alert('✅ 评价已保存！可在项目列表页查看综合评分。');
  // 数据已实时保存到 localStorage，此处为确认反馈
}

// ============================================================
// 工具函数
// ============================================================
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ============================================================
// 十、初始化
// ============================================================
function init() {
  // 从服务器同步最新数据（API 模式）
  syncQuizFromServer();

  // URL Hash 路由：支持 quiz-system.html#catId/itemId 直接跳入知识点
  const hash = location.hash.slice(1);
  if (hash) {
    const parts = hash.split('/');
    const catId = parts[0];
    const itemId = parts[1] || null;
    if (CATEGORIES[catId]) {
      renderTipBar();
      if (itemId && CATEGORIES[catId].items.find(i => i.id === itemId)) {
        navigate('category', catId, itemId);
      } else {
        navigate('category', catId);
      }
    } else {
      renderTipBar();
      navigate('home');
    }
  } else {
    renderTipBar();
    navigate('home');
  }

  // 弹窗点击遮罩关闭
  document.getElementById('codeModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.getElementById('editorModal').addEventListener('click', function(e) {
    if (e.target === this) closeEditor();
  });

  // 编辑器Tab切换时自动保存当前内容
  document.getElementById('editorTextarea').addEventListener('input', function() {
    if (editorFiles[editorActiveTab]) {
      editorFiles[editorActiveTab].content = this.value;
    }
  });
}

// 页面加载
document.addEventListener('DOMContentLoaded', init);

// 全局键盘快捷键
document.addEventListener('keydown', (e) => {
  // ESC关闭弹窗
  if (e.key === 'Escape') {
    const codeModal = document.getElementById('codeModal');
    const editorModal = document.getElementById('editorModal');
    if (editorModal.classList.contains('active')) { closeEditor(); return; }
    if (codeModal.classList.contains('active')) { closeModal(); return; }
  }

  if (currentView === 'test' && !questionAnswered) {
    const q = currentQuestions[currentQIndex];
    if (q.type === 'choice') {
      const key = e.key.toUpperCase();
      if (key >= 'A' && key <= 'D') {
        selectChoice(key);
      }
    }
    if (e.key === 'Enter') {
      e.preventDefault();
      submitAnswer();
    }
  }
  if (currentView === 'test' && questionAnswered) {
    if (e.key === 'Enter' || e.key === 'ArrowRight') {
      e.preventDefault();
      nextQuestion();
    }
  }
});
</script>
