<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>刷题计划</title>
<style>
:root {
  --page-bg: #F3F3F5;
  --card-bg: #ffffff;
  --text: #333333;
  --text-secondary: #7C7B80;
  --text-light: #999999;
  --border: #e8e8e8;
  --green: #66AF48;
  --green-bg: #EFF9E9;
  --easy-color: #67c23a;
  --medium-color: #e6a23c;
  --hard-color: #e74c3c;
  --sidebar-width: 220px;
  --radius: 10px;
  --phase-colors: #8B6914, #1a6b5a, #6b3a7d, #c0392b, #2980b9, #d4a017;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "PingFang SC", -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;
  background: var(--page-bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}

/* ===== Layout ===== */
.app-wrap { display: flex; max-width: 1400px; margin: 0 auto; min-height: 100vh; }

/* ===== Header ===== */
.app-header {
  background: linear-gradient(135deg, #2c2416 0%, #4a3724 50%, #2c2416 100%);
  color: #f5e6c8;
  text-align: center;
  padding: 28px 20px 20px;
  position: relative;
  overflow: hidden;
}
.app-header h1 { font-size: 1.6em; font-weight: 900; letter-spacing: 2px; }
.app-header .subtitle { font-size: 0.85em; opacity: 0.7; margin-top: 4px; }

/* ===== Sidebar ===== */
.sidebar {
  width: var(--sidebar-width);
  flex-shrink: 0;
  background: var(--card-bg);
  border-right: 1px solid var(--border);
  position: sticky;
  top: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.sidebar-title {
  font-size: 15px;
  font-weight: 700;
  padding: 18px 16px 10px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}
.sidebar-title::before {
  content: '';
  display: inline-block;
  width: 3px;
  height: 16px;
  background: var(--green);
  border-radius: 2px;
}

.sidebar-stats {
  padding: 0 16px 8px;
  font-size: 11px;
  color: var(--text-light);
  border-bottom: 1px solid var(--border);
}

.phase-nav {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0 12px;
}
.phase-nav::-webkit-scrollbar { width: 3px; }
.phase-nav::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

.phase-group { margin-bottom: 2px; }

.phase-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-secondary);
  user-select: none;
  transition: background 0.12s;
}
.phase-header:hover { background: #fafafa; }
.phase-arrow { font-size: 8px; transition: transform 0.2s; }
.phase-arrow.open { transform: rotate(90deg); }

.phase-body { display: none; }
.phase-body.open { display: block; }

.cat-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 16px 6px 28px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-secondary);
  transition: all 0.12s;
  border-left: 3px solid transparent;
}
.cat-item:hover { background: #fafafa; color: var(--text); }
.cat-item.active {
  background: var(--green-bg);
  color: var(--green);
  font-weight: 600;
  border-left-color: var(--green);
}
.cat-item .cat-icon { font-size: 14px; }
.cat-item .cat-count {
  margin-left: auto;
  font-size: 10px;
  color: var(--text-light);
  font-weight: 400;
}

/* ===== Main Content ===== */
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  padding: 24px 28px;
}

.category-header { margin-bottom: 20px; }
.category-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 4px;
}
.category-desc {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 12px;
}

/* Progress bar */
.progress-bar-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.progress-track {
  flex: 1;
  height: 6px;
  background: #eee;
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green), #8bc34a);
  border-radius: 3px;
  transition: width 0.3s;
}
.progress-text {
  font-size: 12px;
  color: var(--text-secondary);
  white-space: nowrap;
  min-width: 60px;
  text-align: right;
}

/* Section dividers */
.section-divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 16px 0 12px;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-secondary);
}
.section-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Problem items */
.problem-list { margin-bottom: 16px; }

.problem-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 6px;
  transition: all 0.12s;
}
.problem-item:hover { border-color: #ccc; background: #fafafa; }

.problem-checkbox {
  width: 18px;
  height: 18px;
  cursor: pointer;
  accent-color: var(--green);
  flex-shrink: 0;
}

.problem-info { flex: 1; min-width: 0; }
.problem-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
}
.problem-tags {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.problem-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

/* Badge */
.badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 8px;
  font-weight: 600;
  white-space: nowrap;
}
.badge.easy { background: #e8f5e9; color: var(--easy-color); }
.badge.medium { background: #fff3e0; color: var(--medium-color); }

/* Platform tag */
.platform-tag {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 600;
  white-space: nowrap;
}
.platform-tag.lc { background: #e3f2fd; color: #1565c0; }
.platform-tag.nc { background: #fce4ec; color: #c62828; }

/* Repeat marker */
.repeat-badge {
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 4px;
  background: #fff8e1;
  color: #f57f17;
  font-weight: 600;
  white-space: nowrap;
}

/* Problem link */
.problem-link {
  color: var(--text);
  text-decoration: none;
  transition: color 0.12s;
}
.problem-link:hover { color: #1565c0; text-decoration: underline; }
.problem-item.done .problem-link { color: var(--text-light); text-decoration: line-through; }

/* Open-problem button */
.problem-link-btn {
  font-size: 11px;
  color: #1565c0;
  text-decoration: none;
  white-space: nowrap;
  padding: 2px 10px;
  border: 1px solid #1565c0;
  border-radius: 12px;
  transition: all 0.12s;
  font-weight: 600;
}
.problem-link-btn:hover { background: #1565c0; color: #fff; }

/* Done state */
.problem-item.done .problem-title { color: var(--text-light); text-decoration: line-through; }
.problem-item.done { background: #f9fdf7; }

/* Global progress footer */
.global-footer {
  margin-top: auto;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}
.global-stats {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 13px;
  color: var(--text-secondary);
}
.global-stats .num { font-weight: 700; color: var(--text); }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-light);
  font-size: 14px;
}

/* ===== Mobile ===== */
@media (max-width: 768px) {
  .app-wrap { flex-direction: column; }
  .sidebar {
    width: 100%;
    height: auto;
    position: static;
    border-right: none;
    border-bottom: 1px solid var(--border);
    max-height: 300px;
  }
  .sidebar-title { padding: 12px 14px 8px; }
  .phase-nav { max-height: 250px; }
  .main-content { padding: 16px; }
  .problem-item { flex-wrap: wrap; }
  .problem-meta { margin-left: 28px; }
}
</style>
</head>
<body>

<nav id="global-nav"></nav>

<div class="app-header">
  <h1>📝 刷题计划</h1>
  <div class="subtitle">按知识点分类 · Easy→Medium · LeetCode + 牛客</div>
</div>

<div class="app-wrap">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-title">知识点分类</div>
    <div class="sidebar-stats" id="sidebarStats">加载中...</div>
    <nav class="phase-nav" id="phaseNav"></nav>
  </aside>

  <!-- Content -->
  <main class="main-content" id="mainContent">
    <div class="empty-state" id="emptyState">
      <div style="font-size:32px;margin-bottom:8px;">📚</div>
      <div>选择一个分类开始刷题</div>
    </div>
    <div id="categoryContent" style="display:none;">
      <div class="category-header">
        <div class="category-title" id="catTitle"></div>
        <div class="category-desc" id="catDesc"></div>
        <div class="progress-bar-wrap">
          <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
          <span class="progress-text" id="progressText">0/0</span>
        </div>
      </div>
      <div id="problemContainer"></div>
      <div class="global-footer">
        <div class="global-stats">
          <span>总进度</span>
          <span class="num" id="globalDone">0</span>
          <span>/</span>
          <span class="num" id="globalTotal">0</span>
          <span id="globalPercent">(0%)</span>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="data/app/items-registry.js"></script>
<script src="data/app/nav-component.js"></script>
<script>var PRACTICE_CATEGORIES = [];</script>
<script src="data/app/practice/array.js"></script>
<script src="data/app/practice/string.js"></script>
<script src="data/app/practice/linked-list.js"></script>
<script src="data/app/practice/stack.js"></script>
<script src="data/app/practice/queue.js"></script>
<script src="data/app/practice/two-pointers.js"></script>
<script src="data/app/practice/sliding-window.js"></script>
<script src="data/app/practice/prefix-sum.js"></script>
<script src="data/app/practice/hash-table.js"></script>
<script src="data/app/practice/binary-search.js"></script>
<script src="data/app/practice/sorting.js"></script>
<script src="data/app/practice/binary-tree.js"></script>
<script src="data/app/practice/bst.js"></script>
<script src="data/app/practice/dfs.js"></script>
<script src="data/app/practice/bfs.js"></script>
<script src="data/app/practice/backtracking.js"></script>
<script src="data/app/practice/greedy.js"></script>
<script src="data/app/practice/dp-basic.js"></script>
<script src="data/app/practice/dp-advanced.js"></script>
<script src="data/app/practice/heap.js"></script>
<script src="data/app/practice/union-find.js"></script>
<script src="data/app/practice/graph.js"></script>
<script src="data/app/practice/bit-manipulation.js"></script>
<script src="data/app/practice/math.js"></script>
<script src="data/app/practice/interview-classic.js"></script>
<script>
"use strict";

// 初始化统一导航栏
initGlobalNav("practice");

// ============================================================
// State management (localStorage)
// ============================================================
var STORAGE_KEY = "practice_done";

function loadDoneMap() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch(e) { return {}; }
}

function saveDoneMap(map) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(map)); } catch(e) {}
}

function isDone(catId, idx) {
  return !!loadDoneMap()[catId + "_" + idx];
}

function toggleDone(catId, idx) {
  var map = loadDoneMap();
  var key = catId + "_" + idx;
  if (map[key]) { delete map[key]; } else { map[key] = true; }
  saveDoneMap(map);
  return !!map[key];
}

// ============================================================
// Computed helpers
// ============================================================
var PHASE_LABELS = {
  1: "Ⅰ 基础数据结构",
  2: "Ⅱ 算法思想入门",
  3: "Ⅲ 排序与树",
  4: "Ⅳ 搜索与回溯",
  5: "Ⅴ 算法进阶",
  6: "Ⅵ 图论与综合",
};

var PHASES = [1,2,3,4,5,6];

function getCategoryCount(cat) {
  return cat.items.length;
}

function getCategoryDoneCount(cat) {
  var count = 0;
  for (var i = 0; i < cat.items.length; i++) {
    if (isDone(cat.id, i)) count++;
  }
  return count;
}

function getGlobalStats() {
  var done = 0, total = 0;
  for (var ci = 0; ci < PRACTICE_CATEGORIES.length; ci++) {
    var cat = PRACTICE_CATEGORIES[ci];
    total += cat.items.length;
    done += getCategoryDoneCount(cat);
  }
  return { done: done, total: total };
}

function getCategoriesByPhase(phase) {
  var result = [];
  for (var ci = 0; ci < PRACTICE_CATEGORIES.length; ci++) {
    if (PRACTICE_CATEGORIES[ci].phase === phase) result.push(PRACTICE_CATEGORIES[ci]);
  }
  return result.sort(function(a,b) { return a.order - b.order; });
}

// ============================================================
// Rendering
// ============================================================
var currentCategoryId = null;

function renderSidebar() {
  var nav = document.getElementById("phaseNav");
  var html = "";
  var expandedPhases = loadExpandedPhases();

  for (var pi = 0; pi < PHASES.length; pi++) {
    var phase = PHASES[pi];
    var cats = getCategoriesByPhase(phase);
    if (cats.length === 0) continue;
    var openClass = expandedPhases[phase] ? " open" : "";
    html += '<div class="phase-group">';
    html += '<div class="phase-header" data-phase="' + phase + '">';
    html += '<span class="phase-arrow' + openClass + '">▶</span>';
    html += '<span>' + (PHASE_LABELS[phase] || "阶段 " + phase) + '</span>';
    html += '</div>';
    html += '<div class="phase-body' + openClass + '">';
    for (var ci = 0; ci < cats.length; ci++) {
      var cat = cats[ci];
      var active = cat.id === currentCategoryId ? " active" : "";
      var done = getCategoryDoneCount(cat);
      var total = getCategoryCount(cat);
      html += '<div class="cat-item' + active + '" data-cat="' + cat.id + '">';
      html += '<span class="cat-icon">' + cat.icon + '</span>';
      html += '<span>' + cat.title + '</span>';
      html += '<span class="cat-count">' + done + '/' + total + '</span>';
      html += '</div>';
    }
    html += '</div>';
    html += '</div>';
  }

  nav.innerHTML = html;

  // Update sidebar stats
  var stats = getGlobalStats();
  document.getElementById("sidebarStats").textContent = "已完成 " + stats.done + " / " + stats.total + " 题";
}

function loadExpandedPhases() {
  var key = "practice_expanded";
  try { return JSON.parse(localStorage.getItem(key) || "{\"1\":true,\"2\":true}"); } catch(e) { return {1:true,2:true}; }
}

function saveExpandedPhases(map) {
  try { localStorage.setItem("practice_expanded", JSON.stringify(map)); } catch(e) {}
}

function renderCategory(catId) {
  currentCategoryId = catId;
  var cat = null;
  for (var ci = 0; ci < PRACTICE_CATEGORIES.length; ci++) {
    if (PRACTICE_CATEGORIES[ci].id === catId) { cat = PRACTICE_CATEGORIES[ci]; break; }
  }
  if (!cat) return;

  document.getElementById("emptyState").style.display = "none";
  document.getElementById("categoryContent").style.display = "block";

  // Title and desc
  document.getElementById("catTitle").textContent = cat.icon + " " + cat.title;
  document.getElementById("catDesc").textContent = cat.desc;

  // Progress
  var done = getCategoryDoneCount(cat);
  var total = getCategoryCount(cat);
  var pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressText").textContent = done + "/" + total;

  // Filter Easy and Medium items
  var easyItems = [];
  var mediumItems = [];
  for (var i = 0; i < cat.items.length; i++) {
    if (cat.items[i].difficulty === "easy") easyItems.push({ item: cat.items[i], idx: i });
    else mediumItems.push({ item: cat.items[i], idx: i });
  }

  var container = document.getElementById("problemContainer");
  var html = "";

  // Easy section
  if (easyItems.length > 0) {
    html += '<div class="section-divider">🟢 Easy</div>';
    html += '<div class="problem-list">';
    for (var ei = 0; ei < easyItems.length; ei++) {
      html += renderProblemItem(cat.id, easyItems[ei].item, easyItems[ei].idx);
    }
    html += '</div>';
  }

  // Medium section
  if (mediumItems.length > 0) {
    html += '<div class="section-divider">🟡 Medium</div>';
    html += '<div class="problem-list">';
    for (var mi = 0; mi < mediumItems.length; mi++) {
      html += renderProblemItem(cat.id, mediumItems[mi].item, mediumItems[mi].idx);
    }
    html += '</div>';
  }

  container.innerHTML = html;

  // Global stats
  updateGlobalStats();
  renderSidebar();
}

function renderProblemItem(catId, item, idx) {
  var done = isDone(catId, idx);
  var doneClass = done ? " done" : "";

  var platformHtml = item.platform === "leetcode"
    ? '<span class="platform-tag lc">★ LC ' + item.problemId + '</span>'
    : '<span class="platform-tag nc">● 牛客 ' + item.problemId + '</span>';

  var repeatHtml = item.repeat
    ? '<span class="repeat-badge">⟳ 多次练习</span>'
    : "";

  var tagsHtml = "";
  for (var ti = 0; ti < item.tags.length; ti++) {
    tagsHtml += '<span class="badge ' + item.difficulty + '">' + item.tags[ti] + '</span>';
  }

  var checked = done ? " checked" : "";
  var linkUrl = item.url || (item.platform === "leetcode"
    ? "https://leetcode.cn/problems/?search=" + item.problemId
    : "https://www.nowcoder.com/ta/coding-interviews");
  var titleHtml = item.url
    ? '<a class="problem-link" href="' + linkUrl + '" target="_blank" rel="noopener">' + item.title + '</a>'
    : '<span class="problem-title">' + item.title + '</span>';

  return '<div class="problem-item' + doneClass + '" data-cat="' + catId + '" data-idx="' + idx + '">' +
    '<input type="checkbox" class="problem-checkbox"' + checked + ' aria-label="标记完成">' +
    '<div class="problem-info">' +
    '  <div class="problem-title">' + titleHtml + '</div>' +
    '  <div class="problem-tags">' + tagsHtml + repeatHtml + '</div>' +
    '</div>' +
    '<div class="problem-meta">' +
    '<a href="' + linkUrl + '" target="_blank" rel="noopener" class="problem-link-btn" title="打开题目">做题 →</a>' +
    '  <span class="badge ' + item.difficulty + '">' + (item.difficulty === "easy" ? "Easy" : "Medium") + '</span>' +
    platformHtml +
    '</div>' +
    '</div>';
}

function updateGlobalStats() {
  var stats = getGlobalStats();
  document.getElementById("globalDone").textContent = stats.done;
  document.getElementById("globalTotal").textContent = stats.total;
  document.getElementById("globalPercent").textContent = "(" + (stats.total > 0 ? Math.round(stats.done / stats.total * 100) : 0) + "%)";
}

// ============================================================
// Event binding
// ============================================================
function bindEvents() {
  // Phase toggle
  document.getElementById("phaseNav").addEventListener("click", function(e) {
    var header = e.target.closest(".phase-header");
    if (header) {
      var phase = parseInt(header.dataset.phase, 10);
      var body = header.nextElementSibling;
      var arrow = header.querySelector(".phase-arrow");
      var isOpen = body.classList.contains("open");
      body.classList.toggle("open", !isOpen);
      arrow.classList.toggle("open", !isOpen);
      var expanded = loadExpandedPhases();
      if (isOpen) { delete expanded[phase]; } else { expanded[phase] = true; }
      saveExpandedPhases(expanded);
      return;
    }

    // Category select
    var item = e.target.closest(".cat-item");
    if (item) {
      var catId = item.dataset.cat;
      if (catId === currentCategoryId) return;
      renderCategory(catId);
      return;
    }
  });

  // Checkbox toggle
  document.getElementById("problemContainer").addEventListener("change", function(e) {
    if (e.target.classList.contains("problem-checkbox")) {
      var item = e.target.closest(".problem-item");
      var catId = item.dataset.cat;
      var idx = parseInt(item.dataset.idx, 10);
      var nowDone = toggleDone(catId, idx);
      item.classList.toggle("done", nowDone);
      // Re-render sidebar counts and progress
      renderSidebar();
      renderCategory(currentCategoryId);
    }
  });
}

// ============================================================
// Init
// ============================================================
var firstCat = PRACTICE_CATEGORIES.length > 0 ? PRACTICE_CATEGORIES[0] : null;
if (firstCat) {
  renderSidebar();
  renderCategory(firstCat.id);
  bindEvents();
} else {
  document.getElementById("sidebarStats").textContent = "暂无分类";
}
</script>
</body>
</html>
