<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学习内容页</title>
<style>
:root {
  --bg: #edf2f7;
  --bg-accent: #dfe8f3;
  --card: #ffffff;
  --card-soft: #f8fafc;
  --text: #1f2d3d;
  --text2: #61758a;
  --border: #d8e0ea;
  --shadow: 0 10px 30px rgba(31, 45, 61, 0.08);
  --shadow-soft: 0 2px 10px rgba(31, 45, 61, 0.06);
  --radius: 18px;
  --radius-sm: 12px;
  --c: #2e8b57;
  --cpp: #2f6db3;
  --ds: #dd7a1f;
  --db: #7d4cc2;
  --py: #d65245;
  --todo: #97a6b5;
  --doing: #409eff;
  --done: #42a55e;
  --review: #e6a23c;
  --language: #43a047;
  --systems: #1e88e5;
  --algorithms: #ef6c00;
  --engineering: #c45b1a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(47, 109, 179, 0.12), transparent 32%),
    radial-gradient(circle at top right, rgba(221, 122, 31, 0.1), transparent 28%),
    linear-gradient(180deg, var(--bg-accent), var(--bg));
  min-height: 100vh;
}

a { color: inherit; }

.header {
  position: sticky;
  top: 0;
  z-index: 100;
  color: #fff;
  background: linear-gradient(135deg, #16213e 0%, #1f3b63 55%, #234e70 100%);
  box-shadow: 0 10px 30px rgba(22, 33, 62, 0.22);
}

.header::after {
  content: "";
  position: absolute;
  inset: auto 0 0;
  height: 1px;
  background: rgba(255, 255, 255, 0.12);
}

.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 18px 20px 14px;
  display: flex;
  gap: 16px;
  align-items: flex-start;
  justify-content: space-between;
}

.eyebrow {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.6px;
  color: rgba(255, 255, 255, 0.68);
  margin-bottom: 6px;
}

.header h1 {
  font-size: 24px;
  font-weight: 800;
  letter-spacing: 0.4px;
}

.header-subtitle {
  margin-top: 6px;
  font-size: 13px;
  color: rgba(255, 255, 255, 0.78);
}

.stack-tabs {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 20px 14px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
}

.stack-tab {
  min-width: max-content;
  padding: 9px 16px;
  border-radius: 999px;
  border: 1px solid rgba(255, 255, 255, 0.16);
  background: rgba(255, 255, 255, 0.08);
  color: rgba(255, 255, 255, 0.8);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s, color 0.15s, transform 0.15s;
}

.stack-tab.active {
  background: rgba(255, 255, 255, 0.95);
  color: #17324f;
}

.stack-tab:hover { transform: translateY(-1px); }

.page {
  max-width: 1360px;
  margin: 0 auto;
  padding: 22px 20px 36px;
  display: grid;
  grid-template-columns: 280px minmax(0, 1fr);
  gap: 18px;
}

.panel {
  background: rgba(255, 255, 255, 0.9);
  border: 1px solid rgba(216, 224, 234, 0.9);
  border-radius: var(--radius);
  box-shadow: var(--shadow-soft);
  backdrop-filter: blur(10px);
}

/* ── 图解容器 ── */
.diagram-block {
  margin: 28px 0;
  padding: 20px 24px;
  background: var(--card-soft);
  border: 1px solid var(--border);
  border-left: 4px solid var(--c);
  border-radius: var(--radius-sm);
  text-align: center;
}

.diagram-block img.centered-diagram {
  max-width: 90%;
  width: auto;
  height: auto;
  display: block;
  margin: 0 auto;
  border-radius: 8px;
}

.diagram-caption {
  font-size: 12px;
  color: var(--text2);
  margin-top: 12px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
  text-align: center;
}

/* ── 文章正文 ── */
.article-body {
  font-size: 15px;
  line-height: 1.9;
  color: var(--text);
}

.article-body h2 {
  font-size: 20px;
  font-weight: 800;
  margin: 32px 0 12px 0;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--border);
}

.article-body h3 {
  font-size: 17px;
  font-weight: 700;
  margin: 24px 0 8px 0;
}

.article-body p {
  margin-bottom: 16px;
  line-height: 1.9;
}

.article-body pre {
  margin: 16px 0;
  padding: 16px;
  background: #1e293b;
  color: #e2e8f0;
  border-radius: 10px;
  overflow-x: auto;
  font-size: 13px;
  line-height: 1.6;
}

.article-body code {
  font-family: "SF Mono", "Cascadia Code", "Fira Code", "Consolas", monospace;
}

.article-body ul, .article-body ol {
  margin: 12px 0;
  padding-left: 24px;
}

.article-body li {
  margin-bottom: 6px;
  line-height: 1.8;
}

.article-body table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0;
  font-size: 14px;
}

.article-body th {
  background: var(--bg-accent);
  font-weight: 700;
  padding: 10px 14px;
  text-align: left;
  border-bottom: 2px solid var(--border);
}

.article-body td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}

.article-body blockquote {
  margin: 16px 0;
  padding: 12px 20px;
  border-left: 4px solid var(--c);
  background: rgba(46, 139, 87, 0.04);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  color: var(--text2);
}

.article-body hr {
  margin: 32px 0;
  border: none;
  border-top: 1px solid var(--border);
}

.article-body a {
  color: var(--c);
  text-decoration: underline;
}

/* ── Intro 区块 ── */
.intro-block {
  font-size: 16px;
  line-height: 2;
  color: var(--text);
  margin: 24px 0 32px 0;
  padding: 20px 24px;
  background: linear-gradient(135deg, rgba(46, 139, 87, 0.05), rgba(46, 139, 87, 0.02));
  border-left: 4px solid var(--c);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}

/* ── 侧边栏导航链接 ── */
.sidebar-nav-link {
  display: block;
  padding: 6px 18px;
  font-size: 13px;
  color: var(--text2);
  border-left: 3px solid transparent;
  text-decoration: none;
  cursor: pointer;
  transition: all 0.15s ease;
}

.sidebar-nav-link:hover {
  color: var(--text);
  background: rgba(0, 0, 0, 0.02);
}

.sidebar-nav-link.active {
  color: var(--c);
  border-left-color: var(--c);
  background: rgba(46, 139, 87, 0.05);
  font-weight: 600;
}

/* ── 旧 section-card 降级样式 ── */
.section-card {
  padding: 16px 0;
  border: none;
  background: none;
  box-shadow: none;
  border-radius: 0;
}

/* ── 文件协议降级提示 ── */
.file-warning {
  margin: 24px 0;
  padding: 16px 20px;
  background: #fef3c7;
  border: 1px solid #f59e0b;
  border-radius: var(--radius-sm);
  color: #92400e;
  font-size: 14px;
}

.sidebar {
  position: sticky;
  top: 134px;
  height: fit-content;
  overflow: hidden;
}

.sidebar-head {
  padding: 18px 18px 14px;
  border-bottom: 1px solid var(--border);
}

.sidebar-title {
  font-size: 15px;
  font-weight: 800;
}

.sidebar-subtitle {
  margin-top: 5px;
  font-size: 12px;
  color: var(--text2);
}

.search-wrap {
  margin-top: 12px;
  display: flex;
  gap: 8px;
}

.search-input,
.sidebar-filter {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 12px;
  font-size: 13px;
  color: var(--text);
  background: #fff;
  outline: none;
}

.search-input:focus,
.sidebar-filter:focus {
  border-color: #6b8db5;
}

.sidebar-body {
  max-height: calc(100vh - 220px);
  overflow: auto;
  padding: 12px;
}

.group {
  margin-bottom: 12px;
}

.group:last-child { margin-bottom: 0; }

.group-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
  padding: 0 6px;
  font-size: 12px;
  font-weight: 800;
  color: var(--text2);
}

.group-count {
  font-size: 11px;
  color: #8ea1b4;
}

.item-link {
  display: block;
  padding: 11px 12px;
  border-radius: 14px;
  text-decoration: none;
  border: 1px solid transparent;
  background: transparent;
  transition: transform 0.15s, box-shadow 0.15s, background 0.15s, border-color 0.15s;
}

.item-link:hover {
  transform: translateY(-1px);
  background: #fff;
  border-color: var(--border);
  box-shadow: var(--shadow-soft);
}

.item-link.active {
  background: linear-gradient(135deg, rgba(64, 158, 255, 0.12), rgba(36, 108, 179, 0.06));
  border-color: rgba(64, 158, 255, 0.34);
}

.item-link + .item-link {
  margin-top: 6px;
}

.item-link-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
}

.item-link-meta {
  margin-top: 5px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  font-size: 11px;
  color: var(--text2);
}

.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 9px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  background: #eef3f8;
  color: var(--text2);
}

.chip.language { background: rgba(67, 160, 71, 0.14); color: var(--language); }
.chip.systems { background: rgba(30, 136, 229, 0.14); color: var(--systems); }
.chip.algorithms { background: rgba(239, 108, 0, 0.14); color: var(--algorithms); }
.chip.engineering { background: rgba(196, 91, 26, 0.14); color: var(--engineering); }
.chip.basic { background: rgba(46, 139, 87, 0.14); color: #2e8b57; }
.chip.intermediate { background: rgba(47, 109, 179, 0.14); color: #2f6db3; }
.chip.advanced { background: rgba(214, 82, 69, 0.14); color: #b23b31; }
.chip.todo { background: rgba(151, 166, 181, 0.16); color: var(--todo); }
.chip.doing { background: rgba(64, 158, 255, 0.16); color: var(--doing); }
.chip.done { background: rgba(66, 165, 94, 0.16); color: var(--done); }
.chip.review { background: rgba(230, 162, 60, 0.16); color: var(--review); }

.content {
  min-width: 0;
}

.hero {
  padding: 22px;
  border-radius: 28px;
  color: #fff;
  background: linear-gradient(145deg, #18314f 0%, #24486d 56%, #315f8d 100%);
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}

.hero::before,
.hero::after {
  content: "";
  position: absolute;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.08);
}

.hero::before {
  width: 180px;
  height: 180px;
  right: -40px;
  top: -60px;
}

.hero::after {
  width: 120px;
  height: 120px;
  right: 110px;
  bottom: -50px;
}

.hero-top,
.hero-actions,
.hero-summary,
.hero-nav {
  position: relative;
  z-index: 1;
}

.hero-top {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.12);
  font-size: 11px;
  font-weight: 700;
}

.hero h2 {
  margin-top: 14px;
  font-size: 30px;
  line-height: 1.25;
}

.hero-summary {
  margin-top: 12px;
  max-width: 820px;
  font-size: 15px;
  line-height: 1.8;
  color: rgba(255, 255, 255, 0.88);
}

.hero-actions {
  margin-top: 18px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.action-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 16px;
  border-radius: 999px;
  text-decoration: none;
  font-size: 13px;
  font-weight: 700;
  transition: transform 0.15s, background 0.15s;
}

.action-btn:hover { transform: translateY(-1px); }

.action-btn.ghost {
  color: #fff;
  background: rgba(255, 255, 255, 0.12);
}

.action-btn.solid {
  background: #fff;
  color: #18314f;
}

.hero-nav {
  margin-top: 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
}

.mini-nav {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.mini-btn {
  border: 0;
  border-radius: 999px;
  padding: 9px 14px;
  cursor: pointer;
  color: #fff;
  background: rgba(255, 255, 255, 0.1);
  font-size: 12px;
  font-weight: 700;
}

.mini-btn:disabled {
  cursor: not-allowed;
  opacity: 0.45;
}

.mini-btn:not(:disabled):hover {
  background: rgba(255, 255, 255, 0.18);
}

.route-label {
  font-size: 12px;
  color: rgba(255, 255, 255, 0.76);
}

.stats-grid {
  margin-top: 16px;
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
}

.stat-card {
  padding: 16px 18px;
}

.stat-title {
  font-size: 12px;
  color: var(--text2);
}

.stat-value {
  margin-top: 8px;
  font-size: 24px;
  font-weight: 800;
}

.stat-note {
  margin-top: 6px;
  font-size: 12px;
  color: var(--text2);
}

.content-grid {
  margin-top: 16px;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 280px;
  gap: 16px;
}

.section-list {
  display: grid;
  gap: 14px;
}

.section-card {
  padding: 20px;
}

.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 12px;
}

.section-title {
  font-size: 18px;
  font-weight: 800;
}

.section-order {
  font-size: 12px;
  color: var(--text2);
}

.section-desc {
  font-size: 14px;
  line-height: 1.8;
  color: #415466;
}

.section-listing {
  margin-top: 14px;
  display: grid;
  gap: 10px;
}

.section-point {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  padding: 10px 12px;
  border-radius: 14px;
  background: var(--card-soft);
  border: 1px solid rgba(216, 224, 234, 0.8);
}

.point-bullet {
  width: 20px;
  height: 20px;
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: rgba(47, 109, 179, 0.12);
  color: #2f6db3;
  font-size: 11px;
  font-weight: 800;
  flex-shrink: 0;
}

.section-point p {
  font-size: 13px;
  line-height: 1.7;
  color: #415466;
}

.side-stack {
  padding: 18px;
  display: grid;
  gap: 14px;
}

.anchor-list {
  display: grid;
  gap: 8px;
}

.anchor-link {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  text-decoration: none;
  padding: 10px 12px;
  border-radius: 12px;
  background: var(--card-soft);
  color: var(--text);
  border: 1px solid transparent;
}

.anchor-link:hover {
  border-color: var(--border);
  background: #fff;
}

.anchor-link small {
  color: var(--text2);
}

.empty-state {
  padding: 20px;
  text-align: center;
  color: var(--text2);
  font-size: 13px;
}

@media (max-width: 1100px) {
  .page {
    grid-template-columns: 1fr;
  }

  .sidebar {
    position: static;
  }

  .content-grid {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 780px) {
  .header-inner {
    padding: 16px 14px 12px;
    flex-direction: column;
    align-items: stretch;
  }

  .stack-tabs,
  .page {
    padding-left: 14px;
    padding-right: 14px;
  }

  .header h1 {
    font-size: 20px;
  }

  .hero {
    padding: 18px;
    border-radius: 22px;
  }

  .hero h2 {
    font-size: 24px;
  }

  .stats-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}
/* ── 深度阅读 markdown 样式 ── */
#sec-deepdive { transition: opacity 0.2s; }
.markdown-body { padding: 6px 0; }
.markdown-body h2 { font-size: 22px; margin: 28px 0 14px; font-weight: 800; color: #1a2a3a; }
.markdown-body h3 { font-size: 18px; margin: 24px 0 12px; font-weight: 700; color: #1f3b5c; }
.markdown-body h4 { font-size: 16px; margin: 20px 0 10px; font-weight: 700; color: #1f3b5c; }
.markdown-body p { font-size: 15px; line-height: 1.85; margin: 14px 0; color: #2c3e50; }
.markdown-body pre { background: #1e2a36; color: #e8edf2; border-radius: 12px; padding: 16px 18px; overflow-x: auto; font-size: 13px; line-height: 1.65; margin: 16px 0; tab-size: 4; }
.markdown-body code { font-family: "Cascadia Code","Fira Code","JetBrains Mono",Consolas,monospace; }
.markdown-body p > code,.markdown-body li > code { background: #eef2f7; color: #d64444; padding: 2px 7px; border-radius: 6px; font-size: 13px; }
.markdown-body table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 14px; }
.markdown-body th,.markdown-body td { padding: 10px 14px; border: 1px solid #d8e0ea; text-align: left; }
.markdown-body th { background: #f0f4f9; font-weight: 700; color: #1f2d3d; }
.markdown-body td { color: #2c3e50; }
.markdown-body tr:nth-child(even) td { background: #f8fafc; }
.markdown-body blockquote { margin: 16px 0; padding: 12px 16px; border-left: 4px solid #409eff; background: #f0f7ff; border-radius: 0 10px 10px 0; color: #34495e; font-size: 14px; line-height: 1.7; }
.markdown-body ul { margin: 12px 0; padding-left: 24px; }
.markdown-body li { font-size: 14px; line-height: 1.8; color: #2c3e50; }
.markdown-body hr { margin: 28px 0; border: 0; border-top: 1px solid #d8e0ea; }
.markdown-body a { color: #409eff; text-decoration: underline; }
.markdown-body a:hover { color: #1a6dcc; }
.markdown-body strong { font-weight: 700; color: #1a2a3a; }
</style>
</head>
<body>

<!-- 统一导航栏 -->
<nav id="global-nav"></nav>

<header class="header">
  <div class="header-inner">
    <div>
      <div class="eyebrow">Learning Route</div>
      <h1 id="pageTitle">学习内容页</h1>
      <div class="header-subtitle" id="pageSubtitle">从入门、原理、实战到调优面试，围绕单个知识点做连续学习。</div>
    </div>

  </div>
  <div class="stack-tabs" id="stackTabs"></div>
</header>

<main class="page">
  <aside class="sidebar panel">
    <div class="sidebar-head">
      <div class="sidebar-title" id="sidebarTitle">知识点目录</div>
      <div class="sidebar-subtitle" id="sidebarSubtitle">按技术栈与象限浏览，点击后更新 learn.html#catId/itemId。</div>
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="text" placeholder="搜索知识点...">
      </div>
      <div class="search-wrap">
        <select class="sidebar-filter" id="quadrantFilter">
          <option value="all">全部象限</option>
          <option value="language">语言/线性结构</option>
          <option value="systems">系统/树形结构</option>
          <option value="algorithms">算法/图结构</option>
          <option value="engineering">工程/算法设计</option>
        </select>
      </div>
    </div>
    <div class="sidebar-body" id="itemNav"></div>
  </aside>

  <section class="content">
    <section class="hero" id="heroCard">
      <div class="hero-top" id="heroBadges"></div>
      <h2 id="heroTitle">选择知识点</h2>
      <div class="hero-summary" id="heroSummary">页面已支持 hash 路由，格式为 learn.html#catId/itemId。</div>
      <div class="hero-actions">
        <a class="action-btn solid" id="heroQuizLink" href="quiz-system.html">🎯 去做 10 题测验</a>
        <a class="action-btn ghost" id="heroKanbanLink" href="learning-kanban.html">📋 返回学习看板</a>
      </div>
      <div class="hero-nav">
        <div class="mini-nav">
          <button class="mini-btn" id="prevBtn" type="button">← 上一个</button>
          <button class="mini-btn" id="nextBtn" type="button">下一个 →</button>
        </div>
        <div class="route-label" id="routeLabel">路由：learn.html#c/syntax</div>
      </div>
    </section>

    <section class="stats-grid" id="statsGrid"></section>

let currentRoute = null;
let contentLoadPromise = null;

function loadScriptOptional(src) {
  return new Promise(resolve => {
    const script = document.createElement("script");
    script.src = src;
    script.onload = () => resolve(true);
    script.onerror = () => resolve(false);
    document.head.appendChild(script);
  });
}

function loadOptionalContent() {
  if (!contentLoadPromise) {
    contentLoadPromise = Promise.all(OPTIONAL_CONTENT_SCRIPTS.map(loadScriptOptional));
  }
  return contentLoadPromise;
}

function getDefaultRoute() {
  const firstCatId = STACK_ORDER.find(id => CATEGORIES[id]) || Object.keys(CATEGORIES)[0];
  const firstItem = firstCatId && CATEGORIES[firstCatId].items[0];
  return { catId: firstCatId, itemId: firstItem ? firstItem.id : null };
}

function parseRoute() {
  const fallback = getDefaultRoute();
  const hash = window.location.hash.slice(1).trim();
  if (!hash) return fallback;

  const [catIdRaw, itemIdRaw] = hash.split("/");
  const catId = catIdRaw && CATEGORIES[catIdRaw] ? catIdRaw : fallback.catId;
  const items = (CATEGORIES[catId] && CATEGORIES[catId].items) || [];
  const itemId = items.find(item => item.id === itemIdRaw)
    ? itemIdRaw
    : (items[0] ? items[0].id : fallback.itemId);

  return { catId, itemId };
}

function navigateTo(catId, itemId, replace) {
  if (!catId || !itemId) return;
  const nextHash = "#" + catId + "/" + itemId;
  if (replace) {
    window.location.replace(nextHash);
    return;
  }
  if (window.location.hash === nextHash) {
    render();
    return;
  }
  window.location.hash = nextHash;
}

function getCurrentCategory() {
  return currentRoute && CATEGORIES[currentRoute.catId];
}

function getCurrentItem() {
  const category = getCurrentCategory();
  if (!category) return null;
  return category.items.find(item => item.id === currentRoute.itemId) || null;
}

function getKanbanState(catId) {
  try {
    return JSON.parse(localStorage.getItem("learning-kanban-" + catId)) || {};
  } catch (error) {
    return {};
  }
}

function getItemStatus(catId, itemId) {
  const state = getKanbanState(catId);
  return state[itemId] || "todo";
}

function getQuizHistory(catId, itemId) {
  try {
    return JSON.parse(localStorage.getItem("quiz_" + catId + "_hist_" + itemId)) || [];
  } catch (error) {
    return [];
  }
}

function getRecentAverage(catId, itemId) {
  const history = getQuizHistory(catId, itemId);
  if (!history.length) return null;
  const recent = history.slice(-3);
  return Math.round(recent.reduce((sum, entry) => sum + entry.score, 0) / recent.length);
}

function escapeHtml(value) {
  const div = document.createElement("div");
  div.textContent = value;
  return div.innerHTML;
}

function getQuadrantLabel(catId, quadrant) {
  return (CATEGORIES[catId] && CATEGORIES[catId].quadrantLabels && CATEGORIES[catId].quadrantLabels[quadrant]) || quadrant;

function getLearnContent(catId, item) {

  const content = byCat[item.id];
  if (content && Array.isArray(content.sections)) {

  return buildFallbackContent(catId, item);
}

function renderStackTabs() {
  document.getElementById("stackTabs").innerHTML = STACK_ORDER
    .filter(catId => CATEGORIES[catId])
    .map(catId => {
      const category = CATEGORIES[catId];
      const active = currentRoute.catId === catId ? "active" : "";
      return "<button class=\"stack-tab " + active + "\" data-cat=\"" + catId + "\">" + category.icon + " " + category.label + "</button>";
    })
    .join("");

  document.querySelectorAll(".stack-tab").forEach(button => {
    button.addEventListener("click", function() {
      const catId = this.dataset.cat;
      const firstItem = CATEGORIES[catId] && CATEGORIES[catId].items[0];
      if (firstItem) navigateTo(catId, firstItem.id);
    });
  });
}

function renderSidebar() {
  const category = getCurrentCategory();
  if (!category) return;

  const search = document.getElementById("searchInput").value.trim().toLowerCase();
  const quadrantFilter = document.getElementById("quadrantFilter").value;
  const groups = {};

  category.items.forEach(item => {
    const haystack = [item.title, item.desc || "", (item.tags || []).join(" ")].join(" ").toLowerCase();
    if (search && !haystack.includes(search)) return;
    if (quadrantFilter !== "all" && item.quadrant !== quadrantFilter) return;
    if (!groups[item.quadrant]) groups[item.quadrant] = [];
    groups[item.quadrant].push(item);
  });

  document.getElementById("sidebarTitle").textContent = category.icon + " " + category.label + " · 知识点目录";
  document.getElementById("sidebarSubtitle").textContent = "共 " + category.items.length + " 个知识点，当前已筛出 " + Object.values(groups).reduce((sum, list) => sum + list.length, 0) + " 个。";

  const body = Object.keys(category.quadrantLabels || {}).map(quadrant => {
    const items = groups[quadrant] || [];
    if (!items.length) return "";
    return "<section class=\"group\">"
      + "<div class=\"group-title\"><span>" + escapeHtml(category.quadrantLabels[quadrant]) + "</span><span class=\"group-count\">" + items.length + "</span></div>"
      + items.map(item => renderItemLink(category.id, item)).join("")
      + "</section>";
  }).join("");

  document.getElementById("itemNav").innerHTML = body || "<div class=\"empty-state\">没有匹配的知识点，换个关键词试试。</div>";
}

function renderItemLink(catId, item) {
  const active = currentRoute.catId === catId && currentRoute.itemId === item.id ? "active" : "";
  const status = getItemStatus(catId, item.id);
  const avg = getRecentAverage(catId, item.id);
  return "<a class=\"item-link " + active + "\" href=\"#" + catId + "/" + item.id + "\">"
    + "<div class=\"item-link-title\">" + escapeHtml(item.title) + "</div>"
    + "<div class=\"item-link-meta\">"
    + "<span class=\"chip " + item.ring + "\">" + escapeHtml(RING_LABELS[item.ring] || item.ring) + "</span>"
    + "<span class=\"chip " + STATUS_CHIP[status] + "\">" + escapeHtml(STATUS_LABELS[status]) + "</span>"
    + (avg === null ? "<span class=\"chip\">未测</span>" : "<span class=\"chip\">均分 " + avg + "</span>")
    + "</div>"
    + "</a>";
}

function renderHero() {
  const category = getCurrentCategory();
  const item = getCurrentItem();
  if (!category || !item) return;

  const avg = getRecentAverage(category.id, item.id);
  const status = getItemStatus(category.id, item.id);
  const content = getLearnContent(category.id, item);

  document.title = category.label + " - " + item.title + " - 学习内容页";
  document.getElementById("pageTitle").textContent = category.icon + " " + category.label + " · 学习内容页";
  document.getElementById("pageSubtitle").textContent = "当前知识点：" + item.title + "。页面路由格式固定为 learn.html#<catId>/<itemId>。";
  document.getElementById("heroTitle").textContent = item.title;
  document.getElementById("heroSummary").textContent = content.summary || item.desc || "该知识点学习内容尚待补齐。";
  document.getElementById("routeLabel").textContent = "路由：learn.html#" + category.id + "/" + item.id;

  const quizHref = "quiz-system.html#" + category.id + "/" + item.id;
  document.getElementById("goQuizLink").href = quizHref;
  document.getElementById("heroQuizLink").href = quizHref;
  document.getElementById("backKanbanLink").href = "learning-kanban.html";
  document.getElementById("heroKanbanLink").href = "learning-kanban.html";

  document.getElementById("heroBadges").innerHTML = [
    "<span class=\"hero-badge\">" + category.icon + " " + escapeHtml(category.label) + "</span>",
    "<span class=\"hero-badge\">" + escapeHtml(getQuadrantLabel(category.id, item.quadrant)) + "</span>",
    "<span class=\"hero-badge\">" + escapeHtml(RING_LABELS[item.ring] || item.ring) + "</span>",
    "<span class=\"hero-badge\">" + escapeHtml(STATUS_LABELS[status]) + "</span>",
    avg === null ? "<span class=\"hero-badge\">未测验</span>" : "<span class=\"hero-badge\">最近均分 " + avg + "</span>"
  ].join("");

  renderPrevNext(category, item);
}

function renderPrevNext(category, item) {
  const index = category.items.findIndex(entry => entry.id === item.id);
  const prevItem = index > 0 ? category.items[index - 1] : null;
  const nextItem = index >= 0 && index < category.items.length - 1 ? category.items[index + 1] : null;

  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  prevBtn.disabled = !prevItem;
  nextBtn.disabled = !nextItem;

  prevBtn.onclick = function() {
    if (prevItem) navigateTo(category.id, prevItem.id);
  };
  nextBtn.onclick = function() {
    if (nextItem) navigateTo(category.id, nextItem.id);
  };
}

function renderStats() {
  const category = getCurrentCategory();
  const item = getCurrentItem();
  if (!category || !item) return;

  const status = getItemStatus(category.id, item.id);
  const history = getQuizHistory(category.id, item.id);
  const avg = getRecentAverage(category.id, item.id);
  const sameQuadrantCount = category.items.filter(entry => entry.quadrant === item.quadrant).length;

  document.getElementById("statsGrid").innerHTML = [
    { title: "当前状态", value: STATUS_LABELS[status], note: "来自学习看板的本地状态" },
    { title: "最近均分", value: avg === null ? "--" : avg + "分", note: history.length ? "取最近 3 次测验平均" : "还没有测验记录" },
    { title: "测验次数", value: history.length, note: history.length ? "建议学完后再补一次测验" : "先学内容再去测验" },
    { title: "同象限知识点", value: sameQuadrantCount, note: getQuadrantLabel(category.id, item.quadrant) + " 方向的连续学习范围" }
  ].map(stat => {
    return "<section class=\"panel stat-card\">"
      + "<div class=\"stat-title\">" + escapeHtml(stat.title) + "</div>"
      + "<div class=\"stat-value\">" + escapeHtml(String(stat.value)) + "</div>"
      + "<div class=\"stat-note\">" + escapeHtml(stat.note) + "</div>"
      + "</section>";
  }).join("");
}

// ── Markdown 渲染增强 ──

/**
 * 解析 Markdown 文件为 HTML（使用 marked.js，带图解增强）
 * @param {string} md - Markdown 源文本
 * @param {string} baseDir - 相对于页面 basePath 的基础目录（用于相对路径图片）
 */
function renderMarkdownEnhanced(md, baseDir, itemId) {
  if (typeof marked !== "undefined") {
    var html = marked.parse(md);
    html = enhanceImages(html, baseDir);
    html = enhanceHeadings(html);
    html = postprocessMarkdown(html, itemId || "");
    return html;
  }
  // 回退到内置渲染器
  return renderMarkdown(md);
}

/**
 * 将 img 标签居中 + 添加 caption
 */
function enhanceImages(html, baseDir) {
  // 标记图片为居中
  return html.replace(/<img( src="([^"]+)"[^>]*)\/>/g, function(_, tag, src) {
    // 从 alt 提取 caption（标记中已设置）
    var caption = "";
    var altMatch = tag.match(/alt="([^"]*)"/);
    if (altMatch) caption = altMatch[1];
    var classAttr = 'class="centered-diagram"';
    if (baseDir) {
      // 确保图片路径正确
      src = baseDir + "/" + src.replace(/^\.\//, "");
    }
    return '<div class="diagram-block">'
      + '<img src="' + src + '"' + classAttr + '/>'
      + (caption ? '<div class="diagram-caption">' + caption + '</div>' : '')
      + '</div>';
  });
}

/**
 * 标题增强：给 h2 加 id 用于侧边栏锚点
 */
function enhanceHeadings(html) {
  return html.replace(/<h2([^>]*)>([^<]+)<\/h2>/g, function(_, attrs, text) {
    var id = text.replace(/[^a-zA-Z0-9一-鿿]/g, "-").toLowerCase();
    return '<h2' + attrs + ' id="sec-' + id + '">' + text + '</h2>';
  });
}

/**
 * 后处理 Markdown HTML：
 * 1. 清理 <!-- item: xxx --> 注释后的重复文章内容
 * 2. 把 [文字](db-x) 内部锚点链接转成 learn.html#catId/db-x 路由跳转
 */
function postprocessMarkdown(html, itemId) {
  // 1. 清理重复内容
  var itemCommentIdx = html.indexOf('<!-- item: ' + itemId + ' -->');
  if (itemCommentIdx > 0) {
    var firstArrowIdx = html.indexOf('>', itemCommentIdx);
    if (firstArrowIdx > 0) {
      html = html.substring(0, itemCommentIdx) + html.substring(firstArrowIdx + 1);
    }
  }

  // 2. 内部锚点链接转成 learn.html#<catId>/<锚点> 路由跳转
  // 匹配 <a href="hnsw">HNSW 算法深度解析</a> 这类链接，排除 https:// 外部链接
  html = html.replace(/<a href="((?!https?:\/\/)[^"]+)">/g, function(_, href) {
    // 检查 href 是否是已知知识点 ID（在 CATEGORIES 中）
    var foundCatId = null;
    for (var cid in CATEGORIES) {
      for (var i = 0; i < CATEGORIES[cid].items.length; i++) {
        if (CATEGORIES[cid].items[i].id === href) {
          foundCatId = cid;
          break;
        }
      }
      if (foundCatId) break;
    }
    if (foundCatId) {
      return '<a href="learn.html#' + foundCatId + '/' + href + '">';
    }
    // 不是已知知识点，当作页面内锚点
    return '<a href="#sec-' + href.replace(/[^a-zA-Z0-9\-]/g, '-') + '">';
  });

  return html;
}

/**
 * 构建 MD 文件路径
 */
function getMdFilePath(catId, itemId) {
  // catId 格式如 "c", "cpp", "db", "py", "linux", "vdb"
  // vdb 映射到 db 目录
  var stackDir = catId === "vdb" ? "db" : catId;

  // 优先检查标准路径（data/learn-deep/{stack}/{quadrant}/{id}.md）
  // 其次检查 illustrate 路径
  var paths = [
    "data/learn-deep/" + stackDir + "/language/" + itemId + ".md",
    "data/learn-deep/" + stackDir + "/systems/" + itemId + ".md",
    "data/learn-deep/" + stackDir + "/algorithms/" + itemId + ".md",
    "data/learn-deep/" + stackDir + "/engineering/" + itemId + ".md",
    // 根目录（通用知识点）
    "data/learn-deep/" + stackDir + "/" + itemId + ".md",
    // illustrate 系列
    "data/learn-deep/illustrate/" + catId + "/" + itemId + ".md",
    "data/learn-deep/illustrate/" + stackDir + "/" + itemId + ".md",
  ];

  return paths[0]; // 返回主路径，实际加载时尝试所有
}

function tryLoadMdFile(catId, itemId, itemStack, callback) {
  // vdb 产品在 CATEGORIES 中归类为 db，但 MD 文件在 illustrate/{product}/
  var vdbProducts = {
    "vector_basic": "faiss", "ivf_variants": "faiss", "hnsw": "faiss",
    "graph_index": "faiss", "pq_quant": "faiss", "quantization": "faiss",
    "scalar_quant": "faiss", "diskann": "diskann",
    "milvus_arch": "milvus", "milvus_segment": "milvus",
    "milvus_index": "milvus", "milvus_search": "milvus",
    "pinecone_serverless": "pinecone", "pinecone_storage": "pinecone",
  };

  // 构建路径列表
  var paths = [];
  var stackDir = itemStack || catId;

  // 1) 标准路径（按象限）
  paths.push("data/learn-deep/" + stackDir + "/language/" + itemId + ".md");
  paths.push("data/learn-deep/" + stackDir + "/systems/" + itemId + ".md");
  paths.push("data/learn-deep/" + stackDir + "/algorithms/" + itemId + ".md");
  paths.push("data/learn-deep/" + stackDir + "/engineering/" + itemId + ".md");
  paths.push("data/learn-deep/" + stackDir + "/" + itemId + ".md");

  // 2) illustrate 系列（通用 db 知识点）
  if (catId === "db" && !vdbProducts[itemId]) {
    paths.push("data/learn-deep/db/" + itemId + ".md");
    paths.push("data/learn-deep/illustrate/db/" + itemId + ".md");
  }

  // 3) vdb 产品专属路径
  if (vdbProducts[itemId]) {
    paths.push("data/learn-deep/illustrate/" + vdbProducts[itemId] + "/" + itemId + ".md");
  }

  var tryNext = function(idx) {
    if (idx >= paths.length) { callback(null); return; }
    fetch(paths[idx])
      .then(function(r) {
        if (!r.ok) throw new Error("not found");
        return r.text();
      })
      .then(function(md) { callback({ md: md, path: paths[idx] }); })
      .catch(function() { tryNext(idx + 1); });
  };
  tryNext(0);
}

// 保留原有 renderMarkdown 用于 file:// 降级

function renderSections() {
  const category = getCurrentCategory();
  const item = getCurrentItem();
  if (!category || !item) return;

  // 1) 优先从 LEARN_DEEP_CONTENT bundle 读取（支持 file:// 协议）
  const bundled = window.LEARN_DEEP_CONTENT && window.LEARN_DEEP_CONTENT[item.id];
  if (bundled) {
    const html = renderMarkdownEnhanced(bundled, "", item.id);

    // 提取 intro（首个段落）
    let introHtml = "";
    let bodyHtml = html;
    const introMatch = html.match(/^(<p>.*?<\/p>)\s*/);
    if (introMatch) {
      introHtml = '<div class="intro-block">' + introMatch[1] + '</div>';
      bodyHtml = html.substring(introMatch[0].length);
    }

    document.getElementById("sections").innerHTML = introHtml
      + (bodyHtml ? '<div class="article-body">' + bodyHtml + '</div>' : '');
    setupSidebarAnchors();
    return;
  }

  // 2) bundle 中没有 → 尝试 fetch MD 文件（http:// 协议下用）
  tryLoadMdFile(category.id, item.id, item.stack, function(result) {
    if (result) {
      // MD 文件存在 → 渲染 Markdown
      const baseDir = result.path.substring(0, result.path.lastIndexOf("/"));
      const html = renderMarkdownEnhanced(result.md, baseDir, item.id);

      let introHtml = "";
      let bodyHtml = html;
      const introMatch = html.match(/^(<p>.*?<\/p>)\s*/);
      if (introMatch) {
        introHtml = '<div class="intro-block">' + introMatch[1] + '</div>';
        bodyHtml = html.substring(introMatch[0].length);
      }

      document.getElementById("sections").innerHTML = introHtml
        + (bodyHtml ? '<div class="article-body">' + bodyHtml + '</div>' : '');
    } else {
      // 无 bundle 也无 MD → 回退到 JS 模板
      const content = getLearnContent(category.id, item);
      document.getElementById("sections").innerHTML = renderFallbackSections(content);
    }

    setupSidebarAnchors();
  });
}

function renderFallbackSections(content) {
  const sections = SECTION_META.map(meta => {
    const matched = (content.sections || []).find(s => s.key === meta.key) || {};
    return {
      key: meta.key,
      title: matched.title || meta.title,
      desc: matched.desc || "内容待补充。",
      badge: meta.badge,
      points: matched.points || []
    };
  });

  return sections.map(section => {
    const points = section.points.length
      ? section.points.map((point, index) => "<div class=\"section-point\"><span class=\"point-bullet\">" + (index + 1) + "</span><p>" + escapeHtml(point) + "</p></div>").join("")
      : "<div class=\"empty-state\">当前 section 还没有内容。</div>";
    return "<section class=\"panel section-card\" id=\"sec-" + section.key + "\">"
      + "<div class=\"section-head\"><div class=\"section-title\">" + escapeHtml(section.title) + "</div><div class=\"section-order\">" + section.badge + "</div></div>"
      + "<div class=\"section-desc\">" + escapeHtml(section.desc) + "</div>"
      + "<div class=\"section-listing\">" + points + "</div>"
      + "</section>";
  }).join("");
}

// 侧边栏锚点高亮
function setupSidebarAnchors() {
  const headings = document.querySelectorAll("#sections h2");
  const navLinks = document.querySelectorAll(".sidebar-nav a");
  if (!headings.length || !navLinks.length) return;

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.id;
        navLinks.forEach(link => {
          link.classList.toggle("active", link.getAttribute("href") === "#" + id);
        });
      }
    });
  }, { rootMargin: "-20% 0px -60% 0px", threshold: 0 });

  headings.forEach(h => observer.observe(h));
}

function renderAnchors() {
  const category = getCurrentCategory();
  const item = getCurrentItem();
  if (!category || !item) return;

  // 构建目录项（从 sections 中 h2 标题提取）
  const allSections = getArticleSections();
  const anchors = (allSections.map(sec =>
    '<a class="sidebar-nav-link" href="#sec-' + sec.id + '">' + escapeHtml(sec.title) + '</a>'
  )).join("");

  document.getElementById("anchorList").innerHTML = anchors || '<div class="empty-state">暂无目录。</div>';
}

function getArticleSections() {
  // 优先从 MD 内容提取（通过已渲染的 HTML）
  const body = document.querySelector(".article-body");
  if (body) {
    const h2s = body.querySelectorAll("h2");
    return Array.from(h2s).map(h => ({
      id: h.id || h.textContent.replace(/\s+/g, "-").toLowerCase(),
      title: h.textContent
    }));
  }
  // 回退：从 JS 模板提取
  const category = getCurrentCategory();
  const item = getCurrentItem();
  if (!category || !item) return [];
  const content = getLearnContent(category.id, item);
  return (content.sections || []).map(s => ({
    id: s.key,
    title: s.title
  }));
}

// ── 深度阅读：获取 / 渲染 markdown ──
function renderDeepDive() {
  const el = document.getElementById("sec-deepdive");
  const inner = el.querySelector(".section-listing");
  inner.innerHTML = "<div class=\"empty-state\">⏳ 正在加载深度文章...</div>";

  const item = getCurrentItem();
  if (!item) { inner.innerHTML = ""; return; }

  // 1) 优先从内嵌 bundle 读取（支持 file:// 协议）
  const bundled = window.LEARN_DEEP_CONTENT && window.LEARN_DEEP_CONTENT[item.id];
  if (bundled) {
    inner.innerHTML = "<div class=\"markdown-body\">" + renderMarkdown(bundled) + "</div>";
    return;
  }

  // 2) 回退到 fetch（http:// 协议下用）
  const mdFile = "data/learn-deep/" + item.stack + "/" + item.quadrant + "/" + item.id + ".md";
  fetch(mdFile)
    .then(function(r) {
      if (!r.ok) throw new Error("not found");
      return r.text();
    })
    .then(function(md) {
      inner.innerHTML = "<div class=\"markdown-body\">" + renderMarkdown(md) + "</div>";
    })
    .catch(function(e) {
      inner.innerHTML = "<div class=\"empty-state\">📝 深度文章尚未撰写。<br><small>期待后续补充：" + escapeHtml(item.id) + ".md</small>";
    });
}

// ── 简易 markdown → HTML 渲染器（~55 行，无外部依赖）──
function renderMarkdown(md) {
  // 1. 按段落/块分割
  var blocks = [];
  var lines = md.split("\n");
  for (var i = 0; i < lines.length; i++) {
    if (lines[i].trim() === "") continue;
    // 表格
    if (lines[i].trim().startsWith("|") && i + 1 < lines.length && lines[i + 1].trim().match(/^\|[\s\-:|]+\|$/)) {
      var tableRows = [lines[i]], start = i;
      while (i < lines.length && lines[i].trim().startsWith("|")) { tableRows.push(lines[i]); i++; }
      blocks.push({ type:"table", raw:tableRows });
      i--;
      continue;
    }
    // 代码块
    if (lines[i].trim().startsWith("```")) {
      var codeLang = lines[i].trim().slice(3).trim();
      var codeLines = [];
      i++;
      while (i < lines.length && !lines[i].trim().startsWith("```")) { codeLines.push(lines[i]); i++; }
      blocks.push({ type:"code", lang:codeLang, raw:codeLines.join("\n") });
      continue;
    }
    // 标题
    var hMatch = lines[i].match(/^(#{1,4})\s+(.+)/);
    if (hMatch) {
      blocks.push({ type:"h" + hMatch[1].length, raw:inlineMarkup(hMatch[2]) });
      continue;
    }
    // 引用
    if (lines[i].trim().startsWith(">")) {
      var quoteLines = [lines[i].trim().replace(/^>\s?/, "")];
      while (i + 1 < lines.length && lines[i + 1].trim().startsWith(">")) { i++; quoteLines.push(lines[i].trim().replace(/^>\s?/, "")); }
      blocks.push({ type:"blockquote", raw:quoteLines.join("<br>") });
      continue;
    }
    // 分隔线
    if (lines[i].trim().match(/^---+/)) {
      blocks.push({ type:"hr" });
      continue;
    }
    // 无序列表
    if (lines[i].trim().match(/^[\-\*\+]\s+/)) {
      var listItems = [lines[i].trim().replace(/^[\-\*\+]\s+/, "")];
      while (i + 1 < lines.length && lines[i + 1].trim().match(/^[\-\*\+]\s+/)) { i++; listItems.push(lines[i].trim().replace(/^[\-\*\+]\s+/, "")); }
      blocks.push({ type:"ul", raw:listItems.map(function(l) { return inlineMarkup(l); }) });
      continue;
    }
    // 段落
    blocks.push({ type:"p", raw:inlineMarkup(lines[i]) });
  }

  // 2. 渲染为 HTML
  var html = "";
  for (var j = 0; j < blocks.length; j++) {
    var b = blocks[j];
    switch (b.type) {
      case "h1": html += "<h2>" + b.raw + "</h2>"; break;
      case "h2": html += "<h2>" + b.raw + "</h2>"; break;
      case "h3": html += "<h3>" + b.raw + "</h3>"; break;
      case "h4": html += "<h4>" + b.raw + "</h4>"; break;
      case "p":  html += "<p>" + b.raw + "</p>"; break;
      case "hr": html += "<hr>"; break;
      case "blockquote": html += "<blockquote>" + b.raw + "</blockquote>"; break;
      case "ul": html += "<ul>" + b.raw.map(function(l) { return "<li>" + l + "</li>"; }).join("") + "</ul>"; break;
      case "code": html += "<pre><code" + (b.lang ? " class=\"lang-" + encodeHtmlAttr(b.lang) + "\"" : "") + ">" + encodeHtmlContent(b.raw) + "</code></pre>"; break;
      case "table": html += renderTable(b.raw); break;
    }
  }
  return html;
}

function encodeHtmlContent(s) { return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function encodeHtmlAttr(s) { return (s || "").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function inlineMarkup(s) {
  // 行内代码 `code`
  s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
  // 加粗 **text**
  s = s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  // 链接 [text](url)
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return s;
}

function renderTable(rows) {
  // 第一行是表头，第二行是分隔线（忽略），后续行是数据
  var html = "<table>";
  html += "<thead><tr>";
  var headCells = parseTableRow(rows[0]);
  for (var k = 0; k < headCells.length; k++) html += "<th>" + inlineMarkup(headCells[k]) + "</th>";
  html += "</tr></thead><tbody>";
  for (var m = 2; m < rows.length; m++) {
    var cells = parseTableRow(rows[m]);
    html += "<tr>";
    for (var n = 0; n < cells.length; n++) html += "<td>" + inlineMarkup(cells[n]) + "</td>";
    html += "</tr>";
  }
  html += "</tbody></table>";
  return html;
}

function parseTableRow(row) {
  var s = row.trim();
  if (s.startsWith("|")) s = s.slice(1);
  if (s.endsWith("|")) s = s.slice(0, -1);
  return s.split("|").map(function(c) { return c.trim(); });
}

function renderRelated() {
  const category = getCurrentCategory();
  const item = getCurrentItem();
  if (!category || !item) return;

  const related = category.items
    .filter(entry => entry.id !== item.id && entry.quadrant === item.quadrant)
    .slice(0, 6);

  document.getElementById("relatedList").innerHTML = related.length
    ? related.map(entry => {
        return "<a class=\"anchor-link\" href=\"#" + category.id + "/" + entry.id + "\"><span>" + escapeHtml(entry.title) + "</span><small>" + escapeHtml(RING_LABELS[entry.ring] || entry.ring) + "</small></a>";
      }).join("")
    : "<div class=\"empty-state\">当前象限没有更多相邻知识点。</div>";
}

function render() {
  const parsed = parseRoute();
  const normalizedHash = "#" + parsed.catId + "/" + parsed.itemId;
  currentRoute = parsed;

  if (window.location.hash !== normalizedHash) {
    navigateTo(parsed.catId, parsed.itemId, true);
    return;
  }

  renderStackTabs();
  renderSidebar();
  renderHero();
  renderStats();
  renderSections();
  renderAnchors();
  renderRelated();
}

function bindFilters() {
  document.getElementById("searchInput").addEventListener("input", renderSidebar);
  document.getElementById("quadrantFilter").addEventListener("change", renderSidebar);
}

async function init() {
  bindFilters();
  await loadOptionalContent();
  render();
  window.addEventListener("hashchange", render);
}

document.addEventListener("DOMContentLoaded", init);
