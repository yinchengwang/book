              - heading "关键区别" [level=3] [ref=e344]
              - blockquote [ref=e345]: "**L2 在乎\"长度差\"和\"方向差\"；余弦只在乎\"方向\"；内积两者都要。**"
              - paragraph [ref=e346]:
                - text: 举个实际例子：做文本搜索时，
                - code [ref=e347]: "\"苹果\""
                - text: 的向量模长一般比
                - code [ref=e348]: "\"这是一个苹果\""
                - text: 短。
              - list [ref=e349]:
                - listitem [ref=e350]: L2 会把模长大的判为"远"，余弦不在乎。
                - listitem [ref=e351]: Embedding 模型通常建议用余弦/内积，因为语义方向更重要。
                - listitem [ref=e352]: 图像特征（如 SIFT）则常用 L2，因为特征本身已经归一化过。
              - heading "面试/工作中容易忽略的坑" [level=3] [ref=e353]
              - paragraph [ref=e354]:
                - strong [ref=e355]: L2 距离在 Faiss 中返回的是平方和，不是开方后的值。
              - code [ref=e357]: Flat L2 返回：d² = Σ(qᵢ - vᵢ)² 你以为的： d = √Σ(qᵢ - vᵢ)²
              - paragraph [ref=e358]:
                - strong [ref=e359]: 为什么 Faiss 不开方？
                - text: 因为开方是单调变换——排序顺序不变，省掉能省一个 O(N·D) 的开方，在百万级别是巨大的节省。这个细节在后面对比 ANN 召回率时要注意。
              - separator [ref=e360]
              - heading "四、复杂度分析：为什么 Flat 快不起来？" [level=2] [ref=e361]
              - heading "时间成本" [level=3] [ref=e362]
              - code [ref=e364]: "搜索一次的时间 ≈ N × D × (一次浮点乘加的成本) N = 100万, D = 128: 1,000,000 × 128 = 128,000,000 次浮点操作 约 50~200ms（取决于硬件和 SIMD 优化） N = 1亿, D = 128: 100,000,000 × 128 = 12,800,000,000 次浮点操作 约 5~20 秒 → 不可接受"
              - paragraph [ref=e365]:
                - strong [ref=e366]: 所以一条经验法则：
