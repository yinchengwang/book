            - generic [ref=e269]:
              - heading "Flat（Brute Force）精确搜索：所有向量检索的原点" [level=2] [ref=e270]
              - blockquote [ref=e271]:
                - text: 在开始聊 IVF、HNSW、PQ 这些花哨的玩意儿之前，我得先和你聊聊这个最"笨"、最直接、但也最重要的方法。
                - text: 理解了它，后面所有的 ANN 索引你都能一眼看穿本质。
              - separator [ref=e272]
              - heading "一、为什么说 Flat 是所有索引的\"照妖镜\"？" [level=2] [ref=e273]
              - paragraph [ref=e274]: 做向量检索的人经常说一句话：
              - blockquote [ref=e275]: 「你的 HNSW 召回率 98%？——和 Flat 比过吗？」
              - paragraph [ref=e276]:
                - text: 因为不管你怎么优化、怎么近似、怎么压缩，
                - strong [ref=e277]: 最终裁判只有一个
                - text: ：你的结果和 Flat 的结果重合多少。
              - paragraph [ref=e278]: 这就像学排序算法——你学快排之前得先知道冒泡排序是什么，因为它定义了「排序正确」的标准。Flat 就是向量检索世界的冒泡排序。
              - heading "一个很形象的比喻" [level=3] [ref=e279]
              - paragraph [ref=e280]:
                - text: 把向量检索比作
                - strong [ref=e281]: 在图书馆找书
                - text: ：
              - list [ref=e282]:
                - listitem [ref=e283]:
                  - strong [ref=e284]: Flat（暴力搜索）
                  - text: ：你走遍图书馆的每一个书架、每一本书，找到最相关的那本 → 保证找到，但累死
                - listitem [ref=e285]:
                  - strong [ref=e286]: IVF
                  - text: ：你先问管理员「文学类在哪片？」→ 直奔那个区域找 → 快了很多，但万一书放错架了就漏了
                - listitem [ref=e287]:
                  - strong [ref=e288]: HNSW
                  - text: ：你按朋友的朋友的朋友介绍去找人 → 几步就到，但可能不是最优路径
              - paragraph [ref=e289]:
                - strong [ref=e290]: 没有 Flat，你永远不知道上面那些方法到底"丢了多少"。
              - separator [ref=e291]
              - heading "二、Flat 到底在干什么？" [level=2] [ref=e292]
              - heading "2.1 算法流程" [level=3] [ref=e293]
              - paragraph [ref=e294]: Flat 的搜索算法用一句话就能说清楚：
              - code [ref=e296]: "输入：查询向量 q, 数据库 D = [v₀, v₁, ..., vₙ₋₁], 返回数量 k 输出：最近的 k 个向量（下标 + 距离） 步骤： for i = 0 to n-1: dist[i] = 计算(q, vᵢ) // 逐个比 sort(D, dist) // 全排 return D[0..k-1] // 取前k"
              - paragraph [ref=e297]: 没有任何花招。就是遍历、计算距离、排序。
              - heading "2.2 用手算感受一下" [level=3] [ref=e298]
              - paragraph [ref=e299]: 来个超级小的例子，让你对数量级有感觉。
              - paragraph [ref=e300]:
                - text: 假设有 5 个 2 维向量，查询
                - code [ref=e301]: q = (5.0, 3.5)
                - text: ：
              - code [ref=e303]: "向量库： v₀ = (1.2, 3.1) v₁ = (2.5, 4.2) v₂ = (4.3, 1.8) v₃ = (5.6, 3.9) v₄ = (7.2, 2.5) 欧氏距离: d₀ = √((5.0-1.2)² + (3.5-3.1)²) = √(14.44+0.16) = 3.82 d₁ = √((5.0-2.5)² + (3.5-4.2)²) = √(6.25+0.49) = 2.60 d₂ = √((5.0-4.3)² + (3.5-1.8)²) = √(0.49+2.89) = 1.84 d₃ = √((5.0-5.6)² + (3.5-3.9)²) = √(0.36+0.16) = 0.72 ← 最近 d₄ = √((5.0-7.2)² + (3.5-2.5)²) = √(4.84+1.0) = 2.42 Top-3: [v₃, v₂, v₄] 距离: [0.72, 1.84, 2.42]"
              - paragraph [ref=e304]: 这就是 Flat 的全部。100% 准确，但 5 个向量你要算 5 次——50 万个就要算 50 万次，这就是 Flat 的代价。
              - separator [ref=e305]
              - heading "三、距离度量：不只是\"大小\"的问题" [level=2] [ref=e306]
              - paragraph [ref=e307]:
                - text: 说起"两个向量多像"，大多数人第一反应是欧氏距离。但在向量检索的世界里，
                - strong [ref=e308]: 选什么距离比怎么算更重要
                - text: 。
              - heading "三种最常用的距离" [level=3] [ref=e309]
              - table [ref=e310]:
                - rowgroup [ref=e311]:
