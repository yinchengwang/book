# OpenSpec 变更配置
# RAG 系统增强变更

name: rag-enhanced
title: RAG 系统增强
description: |
  Phase 1: 增强 RAG - Embedding 模型升级、重排序、MMR 多样性
  Phase 2: Graph RAG - 知识图谱集成、实体提取、图检索
status: completed
created: 2026-07-07
owner: yinch

# 变更范围
scope:
  - rag/embedding
  - rag/reranker
  - rag/enhanced-retriever
  - rag/knowledge-graph
  - rag/entity-extractor
  - rag/graph-retriever

# 涉及的模块
modules:
  - name: rag
    path: rag/
    type: library

# 里程碑
milestones:
  - id: M1
    name: Phase 1 核心
    description: 完成 Embedding + 重排序
    target_date: 2026-07-21
    tasks:
      - T1.1.1
      - T1.1.2
      - T1.2.1
      - T1.2.2
      - T1.3.1
      - T1.3.2

  - id: M2
    name: Phase 1 增强
    description: 完成 MMR + 查询扩展
    target_date: 2026-07-28
    tasks:
      - T1.3.3
      - T1.3.4

  - id: M3
    name: Phase 2 基础
    description: 完成知识图谱基础设施
    target_date: 2026-08-11
    tasks:
      - T2.1.1
      - T2.1.2
      - T2.1.3
      - T2.1.4

  - id: M4
    name: Phase 2 检索
    description: 完成 Graph 检索器
    target_date: 2026-08-25
    tasks:
      - T2.2.1
      - T2.2.2
      - T2.2.3
      - T2.3.1
      - T2.3.2
      - T2.3.3
      - T2.3.4

# 依赖
dependencies:
  - name: rag
    path: rag/
    description: 现有 RAG 模块
  - name: graph_engine
    path: include/db/graph_engine.h
    description: 现有图存储引擎

# 风险评估
risks:
  - id: R1
    name: 模型推理延迟
    probability: medium
    impact: medium
    mitigation: 添加向量缓存、批量处理、ONNX 量化

  - id: R2
    name: 实体提取质量
    probability: medium
    impact: high
    mitigation: 置信度过滤、人工审核接口

  - id: R3
    name: 图谱规模膨胀
    probability: high
    impact: medium
    mitigation: 限制数量、定期清理、分层存储

# 验收标准
acceptance:
  - 检索质量提升 20% 以上 (召回率)
  - 所有单元测试通过
  - 集成测试通过
  - 向后兼容现有 API
  - 文档完整
